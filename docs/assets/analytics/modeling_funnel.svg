<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320">
  <style>
    .title { font: 16px 'Helvetica', sans-serif; fill: #0f2940; }
    .label { font: 13px 'Helvetica', sans-serif; fill: #1b3c68; }
  </style>
  <rect width="960" height="320" fill="#f7f9fb"/>
  <text x="40" y="40" class="title">Modeling flow: data 0 features 0 models 0 scores</text>
  <rect x="60" y="80" width="180" height="80" rx="10" fill="#e9eff6" stroke="#c6cbd3"/>
  <text x="90" y="115" class="label">Curated data</text>
  <text x="85" y="135" class="label">(PubChem, ChEMBL)</text>
  <rect x="280" y="80" width="180" height="80" rx="10" fill="#d7e7f6" stroke="#c6cbd3"/>
  <text x="320" y="115" class="label">Featurization</text>
  <text x="302" y="135" class="label">graphs + sequences</text>
  <rect x="500" y="80" width="180" height="80" rx="10" fill="#c6ddf5" stroke="#c6cbd3"/>
  <text x="540" y="115" class="label">Model stack</text>
  <text x="528" y="135" class="label">GNN / Transformer</text>
  <rect x="720" y="80" width="180" height="80" rx="10" fill="#b8d3f0" stroke="#c6cbd3"/>
  <text x="760" y="110" class="label">Composite score</text>
  <text x="748" y="130" class="label">ADMET + docking + MD</text>
  <polygon points="240,120 280,120 280,140 240,140" fill="#1f77b4" opacity="0.8"/>
  <polygon points="460,120 500,120 500,140 460,140" fill="#1f77b4" opacity="0.8"/>
  <polygon points="680,120 720,120 720,140 680,140" fill="#1f77b4" opacity="0.8"/>
  <rect x="200" y="190" width="560" height="90" rx="14" fill="#f0f5fb" stroke="#dce3ed"/>
  <text x="220" y="220" class="label">Composite objective</text>
  <text x="220" y="240" class="label">S = w_admet*S_admet + w_bind*S_dock + w_syn*S_sa + w_novel*S_div + w_md*S_stability</text>
  <text x="220" y="260" class="label">E_eff = -k_B T ln 0_i exp(-E_i / k_B T)</text>
</svg>
